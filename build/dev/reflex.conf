# Run development instance with debugger
#
-s -r '\.go$|internal/locale/locales/.*\.yaml$' -- dlv debug --listen 0.0.0.0:38697 --log --build-flags="-buildvcs=false -gcflags=all=-N" --output=./tmp/main --headless=true --continue --accept-multiclient ./cmd/app -- -config build/dev/config.yaml

# Watch for tests
#
-r '\.go$' -- sh -c '
file="$1"
dir=$(dirname "$file")
go test "./$dir"
' -- {}

# Watch for tests of main.go and run`em all
#
-r 'main.go$' -- sh -c '
go test ./...
' -- {}
