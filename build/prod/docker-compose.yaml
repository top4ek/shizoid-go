---
services:
  app:
    image: top4ek/shizoid-go:latest
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./config.yaml:/config.yaml:ro

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
